output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
  sort-order:
    - linter
    - severity
    - file
  show-stats: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
